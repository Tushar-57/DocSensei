services:
  - type: web
    name: docsensei-backend
    runtime: python
    rootDir: Backend
    buildCommand: apt-get install -y tesseract-ocr && pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.12"
